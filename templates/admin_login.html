{% extends "base.html" %}

{% block title %}Iniciar Sesión - Admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5 col-xl-4">
                <div class="auth-card admin-card">
                    <div class="text-center">
                        <h1 class="brand-title">IRON <span>BEAST</span></h1>
                        <p class="brand-subtitle">ADMINISTRADOR</p>
                        <h4 class="mt-3"><i class="fas fa-crown text-warning"></i> PANEL ADMIN</h4>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" placeholder="admin@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="fas fa-user-cog"></i> Acceder como Admin
                        </button>
                    </form>
                    
                    <div class="auth-footer text-center">
                        <p>¿Eres cliente? <a href="{{ url_for('login') }}">Entrar como Cliente</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
