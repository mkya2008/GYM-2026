{% extends "base.html" %}

{% block title %}Iniciar Sesión - Cliente{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5 col-xl-4">
                <div class="auth-card">
                    <div class="text-center">
                        <h1 class="brand-title">IRON <span>BEAST</span></h1>
                        <p class="brand-subtitle">CLIENTE</p>
                        <h4 class="mt-3">INICIAR SESIÓN</h4>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" placeholder="cliente@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                    
                    <div class="auth-footer text-center">
                        <p>¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a></p>
                        <p>¿Eres administrador? <a href="{{ url_for('admin_login') }}">Entrar como Admin</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
