{% extends "base.html" %}

{% block title %}Registrarse{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5 col-xl-4">
                <div class="auth-card">
                    <div class="text-center">
                        <h1 class="brand-title">IRON <span>BEAST</span></h1>
                        <p class="brand-subtitle">REGISTRO</p>
                        <h4 class="mt-3">CREAR CUENTA</h4>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" placeholder="tucorreo@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-user-plus"></i> Registrarse
                        </button>
                    </form>
                    
                    <div class="auth-footer text-center">
                        <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
